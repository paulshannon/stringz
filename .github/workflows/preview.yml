name: Deploy PR previews

# Publishes each pull request to gh-pages/pr-preview/pr-<number>/ and comments
# the preview URL on the PR. Cleans the folder up when the PR is closed.
#
# Note: the GITHUB_TOKEN is read-only for PRs opened from forks, so previews
# only run for branches pushed to this repository.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

# Recommended by pr-preview-action to keep previews/comments in sync.
concurrency: preview-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The site is static (no build step); deploy the repository as-is.
      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: .
          preview-branch: gh-pages
          umbrella-dir: pr-preview
