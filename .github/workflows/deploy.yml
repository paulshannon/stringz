name: Deploy to GitHub Pages

# Publishes the production site to the root of the `gh-pages` branch.
# PR previews (see preview.yml) live under `pr-preview/` on the same branch,
# so this deploy must NOT wipe that directory.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Don't cancel an in-progress deploy; let pushes queue so the branch stays consistent.
concurrency:
  group: deploy-gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy site to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          # Keep PR-preview folders published by pr-preview-action.
          clean-exclude: pr-preview/
          # Rebase instead of force-pushing so concurrent preview deploys aren't clobbered.
          force: false
